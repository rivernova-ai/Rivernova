<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account — Rivernova</title>
    <meta name="description" content="Your personalized education consultation dashboard on Rivernova.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
    <!-- Ambient background orbs -->
    <div class="ambient-bg" aria-hidden="true">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>
    <div class="noise-overlay" aria-hidden="true"></div>

    <nav class="navbar" id="navbar">
        <div class="container">
            <a href="index.html" class="logo" id="logo">
                <span class="logo-icon">
                    <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
                        <defs>
                            <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#6366f1"/>
                                <stop offset="100%" style="stop-color:#a855f7"/>
                            </linearGradient>
                        </defs>
                        <path d="M16 2L4 8v8c0 7.18 5.12 13.89 12 16 6.88-2.11 12-8.82 12-16V8L16 2z" fill="url(#logoGrad)" opacity="0.9"/>
                        <path d="M16 6l-8 4v5.6c0 5.02 3.58 9.72 8 11.2 4.42-1.48 8-6.18 8-11.2V10l-8-4z" fill="rgba(255,255,255,0.15)"/>
                    </svg>
                </span>
                <span class="logo-text">Rivernova</span>
            </a>
            <button class="cta-btn" id="signout-btn" onclick="signOut()">
                Sign Out
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            </button>
        </div>
    </nav>

    <div class="dashboard-container">
        <div class="container">
            <div class="welcome-section">
                <h1>Welcome, <span id="userName" class="gradient-text">User</span>! 👋</h1>
                <p>Your Journey Starts Here</p>
            </div>

            <div class="dashboard-grid">
                <div class="dashboard-card" id="card-profile">
                    <div class="card-icon">
                        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                    </div>
                    <h3>Profile</h3>
                    <p id="userEmail">email@example.com</p>
                    <p class="account-type">Account Type: <span id="accountType">Email</span></p>
                </div>

                <div class="dashboard-card" id="card-applications">
                    <div class="card-icon">
                        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                        </svg>
                    </div>
                    <h3>My Applications</h3>
                    <p>Track your school applications</p>
                    <button class="dashboard-btn" id="btn-applications">View Applications</button>
                </div>

                <div class="dashboard-card" id="card-recommendations">
                    <div class="card-icon">
                        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
                        </svg>
                    </div>
                    <h3>AI Recommendations</h3>
                    <p>Get personalized school matches</p>
                    <button class="dashboard-btn" id="btn-recommendations">Get Recommendations</button>
                </div>


            </div>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
